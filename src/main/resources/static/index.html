<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Chat Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        #chatBox { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<h2>Spring Boot WebSocket Chat</h2>

<div>
    <input type="text" id="username" placeholder="Enter your name">
    <button id="connectBtn" onclick="connect()">Connect</button>
</div>
<br>
<div id="chatBox"></div>
<div>
    <input type="text" id="message" placeholder="Type a message..." disabled>
    <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
</div>

<script>
    let stompClient = null;
    let username = null;

    function connect() {
        username = document.getElementById('username').value.trim();
        if(username) {
            // --- NEW CODE: Prevent multiple clicks ---
            document.getElementById('connectBtn').disabled = true;
            document.getElementById('username').disabled = true;
            // -----------------------------------------

            let socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);

            stompClient.connect({}, function (frame) {
                console.log('Connected: ' + frame);

                // Enable the chat inputs
                document.getElementById('message').disabled = false;
                document.getElementById('sendBtn').disabled = false;

                stompClient.subscribe('/topic/public', function (payload) {
                    let message = JSON.parse(payload.body);
                    displayMessage(message);
                });

                stompClient.send("/app/chat.addUser", {}, JSON.stringify({sender: username, type: 'JOIN'}));
            });
        } else {
            alert("Please enter a name first!");
        }
    }
    function sendMessage() {
        let messageContent = document.getElementById('message').value.trim();
        if(messageContent && stompClient) {
            let chatMessage = {
                sender: username,
                content: messageContent,
                type: 'CHAT'
            };

            // 4. SEND a 'CHAT' message to the server
            stompClient.send("/app/chat.sendMessage", {}, JSON.stringify(chatMessage));
            document.getElementById('message').value = '';
        }
    }

    function displayMessage(message) {
        let chatBox = document.getElementById('chatBox');
        let messageElement = document.createElement('p');

        if (message.type === 'JOIN') {
            messageElement.style.color = 'green';
            messageElement.innerText = message.sender + ' joined the room!';
        } else if (message.type === 'LEAVE') {
            messageElement.style.color = 'red';
            messageElement.innerText = message.sender + ' left the room!';
        } else {
            messageElement.innerText = message.sender + ': ' + message.content;
        }

        chatBox.appendChild(messageElement);
        chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to bottom
    }
</script>
</body>
</html>
